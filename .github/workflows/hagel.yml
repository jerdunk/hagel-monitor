name: Hagelmonitor
on:
  schedule:
    - cron: "*/5 * * * *"    # elke 5 minuten (UTC)
  workflow_dispatch:          # ook handmatig te starten
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt
      - name: Bereken hagelstatus
        env:
          KNMI_API_KEY: ${{ secrets.KNMI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: python hagel_monitor.py
      - name: Upload JSON naar TransIP via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          local-dir: ./out/
          server-dir: ./     # map waar je website staat (vaak /www/ of /public_html/)
