name: Hagelmonitor

on:
  schedule:
    - cron: "*/5 * * * *"    # elke 5 minuten (UTC)
  workflow_dispatch:          # ook handmatig te starten via de Actions-tab

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Repo uitchecken
        uses: actions/checkout@v4

      - name: Python installeren
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies installeren
        run: pip install -r requirements.txt

      - name: Hagelstatus berekenen
        env:
          KNMI_API_KEY: ${{ secrets.KNMI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: python hagel_monitor.py

      - name: JSON uploaden naar TransIP via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: 22
          local_path: './out/*'
          remote_path: 'www/'
